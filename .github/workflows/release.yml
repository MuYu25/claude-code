# .github/workflows/release.yml
name: Build and Release Claude Code Executable

# 当推送版本标签（如 v1.0.0）时触发
on:
  push:
    branches:
        - build

jobs:
  # 定义构建矩阵，为不同操作系统创建独立的构建任务
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
        #   - os: ubuntu-latest
        #     target: linux-x64
        #     binary-ext: ''
        #   - os: macos-latest
        #     target: macos-x64
        #     binary-ext: ''
        #   - os: macos-latest
        #     target: macos-arm64
        #     binary-ext: ''
          - os: windows-latest
            target: windows-x64
            binary-ext: '.exe'

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Bun 环境
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 3. 安装项目依赖
      - name: Install dependencies
        run: bun install

      # 4. 运行标准构建（生成 dist/cli.js）
      - name: Build project
        run: bun run build

      # 5. 编译为可执行文件
      - name: Build executable
        run: |
          bun build ./src/entrypoints/cli.tsx --compile --outfile claude-code-${{ matrix.target }}${{ matrix.binary-ext }}

      # 6. 准备上传到 Release 的压缩包
      - name: Archive binary
        run: |
          mkdir -p artifacts
          cp claude-code-${{ matrix.target }}${{ matrix.binary-ext }} artifacts/

      # 7. 上传到 GitHub Release
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}