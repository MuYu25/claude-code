name: CI

on:
  push:
    branches: [main, feature/*, feat_*]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Build
        run: bun run build
